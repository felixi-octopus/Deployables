apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-configmap
  namespace: argocd-apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Hello from #{Octopus.Environment.Name}</title>
    </head>
    <body>
      <h1>Deployed to #{Octopus.Environment.Name} at #{Octopus.Deployment.Created}</h1>
      <p>Release #{Octopus.Release.Number}</p>
    </body>
    </html>
